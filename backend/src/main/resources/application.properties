# ==========================================
# Application Configuration
# ==========================================
spring.application.name=apartment

# ==========================================
# Database Configuration (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/apartment_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Server Configuration
# ==========================================
server.port=8080

# ==========================================
# JWT Configuration
# ==========================================
app.jwt.secret=MyVerySecretKeyForApartmentManagementSystem2024!
app.jwt.expiration=86400000

# ==========================================
# File Upload / Export Configuration
# ==========================================
app.export.directory=./exports
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# Logging
# ==========================================
logging.level.com.cnpm.apartment=DEBUG
logging.level.org.springframework.security=WARN
