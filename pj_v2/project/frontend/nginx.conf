# ============================================================
#  NGINX CONFIG — Cyberspace + BlueMoon Frontend
#  Phục vụ static SPA + proxy /api sang backend container
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip để giảm băng thông
    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;

    # Proxy các request /api/* sang backend container (đặt theo tên service trong docker-compose)
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — mọi route khác trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
