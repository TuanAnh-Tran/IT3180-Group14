<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- CÁC THẺ META SEO (Tiếng Anh) -->
  <title>Cyberspace Apartment Portal</title>
  <meta name="description" content="Modern and responsive online service portal for residents and the management office of Cyberspace Apartment.">
  <meta name="author" content="Cyberspace Dev Team">
  <meta name="robots" content="index, follow">
  
  <!-- LIÊN KẾT PHÔNG CHỮ GOOGLE FONTS (Inter Font - Cao cấp & Hiện đại) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- LIÊN KẾT CSS TÙY CHỈNH (Style Design System) -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- BIỂU TƯỢNG FAVICON (Emoji Tòa nhà chung cư) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
</head>
<body>

  <!-- ĐIỂM CHÈN KHUNG SƯỜN CHÍNH (Root Mount Container cho Single Page Application) -->
  <div id="app">
    <!-- Trình điều phối JavaScript (js/app.js) sẽ dựng động nội dung vào đây -->
    <!-- Hiển thị màn hình chờ Tiếng Anh trước khi JS tải xong -->
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; background-color: #0b0f19; color: #ffffff; font-family: sans-serif;">
      <div style="width: 48px; height: 48px; border: 4px solid rgba(99, 102, 241, 0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="font-size: 14px; color: #9ca3af; font-weight: 500; letter-spacing: 0.5px;">Loading Cyberspace system...</p>
    </div>
  </div>

  <!-- Thiết lập hoạt cảnh tự xoay tròn cho Spinner -->
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- ĐIỂM KHỞI CHẠY ES6 MODULAR JAVASCRIPT -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
