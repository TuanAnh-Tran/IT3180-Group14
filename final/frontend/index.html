<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberspace + BlueMoon Portal</title>
  <meta name="description" content="Unified resident & apartment management portal — Cyberspace Portal + BlueMoon Resident Manager.">
  <meta name="author" content="Cyberspace Dev Team">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --color-primary: #6366f1;
      --color-accent: #8b5cf6;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
    }
    body { background-color: var(--bg-primary); margin: 0; font-family: 'Inter', sans-serif; }
  </style>
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:999999;"><strong>JS ERROR:</strong> ' + e.message + '<br><small>Line: ' + e.lineno + ' in ' + e.filename + '</small></div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:999999;"><strong>PROMISE REJECTION:</strong> ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</div>';
    });
  </script>
</head>
<body>

  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background-color:#0b0f19;color:#fff;font-family:sans-serif;">
      <div style="width:48px;height:48px;border:4px solid rgba(99,102,241,0.1);border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite;"></div>
      <p style="font-size:14px;color:#9ca3af;font-weight:500;letter-spacing:0.5px;">Loading Cyberspace system...</p>
    </div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script type="module" src="js/app.js?v=5"></script>
</body>
</html>
