# ============================================================
#  DOCKER COMPOSE — Cyberspace + BlueMoon Fullstack
#  Chạy: docker compose up -d --build
#  Truy cập: http://localhost:8080
# ============================================================

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberspace-backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-CYBER_BLUEMOON_SECRET_KEY_2025_CHANGE_IN_PROD}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-CYBER@ADMIN2025}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DATA_DIR=/app/data
    volumes:
      # Lưu dữ liệu JSON database bền vững ngoài container
      - backend_data:/app/data
    ports:
      - "3000:3000"
    networks:
      - cyberspace-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyberspace-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - cyberspace-net

networks:
  cyberspace-net:
    driver: bridge

volumes:
  backend_data:
    driver: local
